name: Mongolian copy audit

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - agent/mongolian-copy-audit-fixes
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Run test suite
        run: npm test
