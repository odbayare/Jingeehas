name: Production hardening

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - agent/mongolian-copy-audit-fixes

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: node --check app.js
      - run: npm test
        env:
          CROSS_PROJECT_FORBIDDEN_TOKEN: ${{ secrets.CROSS_PROJECT_FORBIDDEN_TOKEN }}
      - run: npm run test:e2e
      - run: npm run test:contracts
      - run: npm run verify:production-package
        env:
          CROSS_PROJECT_FORBIDDEN_TOKEN: ${{ secrets.CROSS_PROJECT_FORBIDDEN_TOKEN }}
      - run: git diff --exit-code
      - run: test -z "$(git status --porcelain)"
